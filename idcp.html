<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In-Depth Career Profile | Naviport </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<style> 
.title-container-box {
    background-color: #0000FF; /* Solid Blue - Hindi binago */
    color: #FFFFFF;
    width: 100%;
    padding: 60px; /* Malaking space sa loob */
    text-align: center;
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
    font-family: Arial, sans-serif;
    box-sizing: border-box; /* Para hindi lumampas sa screen width */
    margin-bottom: 40px;
    
    /* Heto ang dagdag para maging round ang edges */
    border-radius: 25px; 
}

/* Track Selection Boxes - Mas Malaki at may Kulay agad */
.track-selection {
    display: flex;
    gap: 40px;
    justify-content: center;
    margin: 50px 0;
    flex-wrap: wrap;
    color: #FFFFFF;
    font-family: Arial, sans-serif;
}

.track-card {
    /* Default color bago i-hover */
    background-color:  #0000FF; 
    border: 4px solid var(--accent);
    width: 400px; /* Mas pinalaki (from 300px) */
    padding: 60px 30px; /* Mas makapal ang loob */
    text-align: center;
    border-radius: 25px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 8px 15px rgba(0,0,0,0.3);
    color: #FFFFFF;
    font-family: Arial, sans-serif;
}

.track-card:hover {
    transform: scale(1.05); /* Lalaki lalo pag hiningian */
    background-color: #FFBF00; /* Mas liliwanag nang konti */
    box-shadow: 0 0 30px var(--accent);
}

.track-card h2 {
    color: var(--accent);
    margin-bottom: 15px;
    font-size: 28px; /* Mas malaking font */
    text-transform: uppercase;
}

.track-card p {
    color: white;
    font-size: 16px;
    line-height: 1.5;
}
</style>

<main>
    <center> <h1 class="title-container-box">Career Professions in the Philippines </h1>

    <div class="track-selection">
        <div class="track-card" onclick="filterCareers('academic')">
            <h2>Academic Track</h2>
            <p style="color: #ccc; font-size: 16px; margin-top: 10px;">Professional & Degree-based Careers</p>
        </div>

        <div class="track-card" onclick="filterCareers('tech-voc')">
            <h2>Technical Professional Track</h2>
            <p style="color: #ccc; font-size: 16px; margin-top: 10px;">Skilled & Technical Careers</p>
        </div>
    </div>

    <div id="career-list-container" class="career-grid">
        </div>
</main>    

</body>
</html>
