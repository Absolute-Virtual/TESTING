<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home | Naviport</title>
    <style>

        /* START OF CODE FOR ALL BASEPLATE WHEN MAKING NEW FILE */

        * {
            font-family: Arial, sans-serif;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #fcfcfc;
        }

        header {
            width: 100%;
            height: 85px;
            background-color: #020E4C;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 3%;
            z-index: 100;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            user-select: none;
            text-decoration: none;
        }

        .brand-container img {
            height: 60px;
            width: 60px;
            object-fit: contain;
        }

        .title-group {
            display: flex;
            flex-direction: column;
        }

        .academy-name {
            color: #ffc004;
            font-size: 14px;
            border-bottom: 1px solid #FFB11A;
            padding-bottom: 2px;
            white-space: nowrap;
        }

        .naviport-name {
            color: #FFB11A;
            font-size: 16px;
            font-weight: bold;
            margin-top: 3px;
        }

        .right-nav {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .deactivated-location {
            color: #FFB11A;
            border: solid 2px #FFB11A;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 14px;
            text-decoration: none;
            transition: all 0.2s ease;
            background-color: transparent;
            display: inline-block;
        }

        .deactivated-location:hover {
            background-color: #FFB11A;
            border: solid 2px #020E4C;
            color: white;
            box-shadow: 4px 4px 0px #FFB11A, 
                        -4px 4px 0px #FFB11A, 
                        4px -4px 0px #FFB11A, 
                        -4px -4px 0px #FFB11A;
            transform: translateY(-2px);
        }

        .hamburger {
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 101;
            padding: 5px;
        }

        .hamburger div {
            width: 28px;
            height: 3px;
            background-color: #FFB11A;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }

        .hamburger.toggle .line1 { 
            transform: rotate(-45deg) translate(-5px, 6px); 
        }

        .hamburger.toggle .line2 { 
            opacity: 0; 
        }

        .hamburger.toggle .line3 { 
            transform: rotate(45deg) translate(-6px, -7px); 
        }

        .nav-links {
            position: fixed;
            top: 0;
            right: 0; 
            width: 280px;
            height: 100vh;
            background-color: #020E4C;
            display: flex;
            flex-direction: column;
            padding-top: 100px;
            z-index: 99;
            box-shadow: -10px 0 20px rgba(0,0,0,0.4);
            transform: translateX(100%);
            transition: transform 0.4s ease-in-out; 
        }

        .nav-links.open {
            transform: translateX(0);
        }

        .nav-links .categ {
            color: #FFB11A;
            padding: 20px 40px;
            font-size: 18px;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease; 
            display: block;
        }

        .nav-links .categ:hover {
            background-color: #FFB11A;
            color: #020E4C;
            padding-left: 60px; 
        }

        /* MOBILE */
        .mobile-auth {
            display: none;
            padding: 0 40px 20px 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .mobile-auth .deactivated-location {
            display: block;
            text-align: center;
            margin-bottom: 15px;
        }

        @media screen and (max-width: 768px) {
            .right-nav .deactivated-location {
                display: none;
            }
            
            .mobile-auth {
                display: block;
            }

            .academy-name {
                font-size: 12px;
            }
            
            .naviport-name {
                font-size: 14px;
            }
            
            .brand-container {
                gap: 10px;
            }
        }

        main {
            margin-top: 120px;
            padding: 40px;
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 12px;
        }

         /* END OF CODE FOR ALL BASEPLATE WHEN MAKING NEW FILE */
    </style>
</head>
<body>

    <header id="main-header">
        <a href="HOMENAVIPORT.html" class="brand-container" id="header-brand">
            <img src="JCA.PNG" alt="JCA Logo">
            <div class="title-group">
                <span class="academy-name">JCSGO Christian Academy</span>
                <span class="naviport-name">JCA Naviport</span>
            </div>
        </a>

        <div class="right-nav">
            <a href="#" class="deactivated-location">Log In</a>
            <a href="#" class="deactivated-location">Sign Up</a>

            <button class="hamburger" id="burger">
                <div class="line1"></div>
                <div class="line2"></div>
                <div class="line3"></div>
            </button>
        </div>

        <nav class="nav-links" id="menu">
            <div class="mobile-auth">
                <a href="#" class="deactivated-location">Log In</a>
                <a href="#" class="deactivated-location">Sign Up</a>
            </div>

            <a href="#" class="categ">HOME</a>
            <a href="#" class="categ">CONTACTS</a>
            <a href="#" class="categ">ABOUT US</a>
        </nav>
    </header>

    <main>
        <h1>Welcome to Naviport</h1>
    </main>

    <footer>
        &copy; 2026 JCSGO Christian Academy. All rights reserved.
    </footer>

    <script>
        const burger = document.getElementById('burger');
        const menu = document.getElementById('menu');

        burger.addEventListener('click', () => {
            menu.classList.toggle('open');
            burger.classList.toggle('toggle');
        });

        document.querySelectorAll('.categ').forEach(link => {
            link.addEventListener('click', () => {
                menu.classList.remove('open');
                burger.classList.remove('toggle');
            });
        });
    </script>
</body>

</html>
